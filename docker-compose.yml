services:
  # ── Local PostgreSQL Database ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: datapulse_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: datapulse
      POSTGRES_PASSWORD: datapulse_secret
      POSTGRES_DB: datapulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapulse -d datapulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Local Redis Cache ────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: datapulse_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: datapulse
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Vite / React Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datapulse_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
