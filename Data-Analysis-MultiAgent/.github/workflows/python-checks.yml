name: Python Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Data-Analysis-MultiAgent/requirements.txt

      - name: Check syntax errors
        run: |
          python -m py_compile Data-Analysis-MultiAgent/backend/core/state.py
          python -m py_compile Data-Analysis-MultiAgent/backend/core/utils.py
          python -m py_compile Data-Analysis-MultiAgent/backend/core/graph.py
          python -m py_compile Data-Analysis-MultiAgent/backend/agents/architect.py
          python -m py_compile Data-Analysis-MultiAgent/backend/agents/statistician.py
          python -m py_compile Data-Analysis-MultiAgent/backend/agents/visualizer.py
          python -m py_compile Data-Analysis-MultiAgent/backend/agents/insights.py
          python -m py_compile Data-Analysis-MultiAgent/backend/models/schemas.py
